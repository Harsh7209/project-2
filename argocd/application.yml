apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: easy-shop
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Harsh7209/project-2.git
    targetRevision: main
    path: kubernetes
  destination:
    server: https://kubernetes.default.svc
    namespace: easy-shop
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
